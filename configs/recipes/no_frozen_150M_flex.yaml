extends: ../base/150M.yaml

model:
  copy_weights: true
  try_flex: true  # try a flex attention implementation
  use_multimer: true
  per_chain_rope: true

training:
  lr: 0.0004
  max_steps: 400000
  batch_size: 2 # 128 and larger is possible for try_opt = true, 24 barely fits for try_opt = false
  accumulate_grad: 1
  val_check_interval: 2000
  

data:
  val_examples: 20000
  num_workers: 4
  data_dir: ./data/diamond

output:
  run_name: 150M_frozen_flex
  checkpoint_every: 2000
